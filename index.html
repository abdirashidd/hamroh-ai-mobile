<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hamroh AI Mobile</title>
  <meta name="description" content="Hamroh AI mobil prototipi" />
  <meta name="theme-color" content="#0b1020" />

  <!-- Mobil qurilmalarda ilovaga o‘xshash ko‘rinish -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="mobile-web-app-capable" content="yes" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Splash screen */
    .splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0b1020 0%, #1d4ed8 100%);
      color: white;
      z-index: 10;
      animation: fadeOut 0.6s ease forwards;
      animation-delay: 1.8s;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 20px;
      text-align: center;
      padding: 0 24px;
    }

    .loader {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="splash">
      <div class="logo">Hamroh AI</div>
      <div class="subtitle">AI sayohatingizni tayyorlamoqda...</div>
      <div class="loader"></div>
    </div>

    <iframe src="MOBILE_FIGMA_LINK_SHU_YERGA" title="Hamroh AI Mobile Prototype"></iframe>
  </div>
</body>
</html>
